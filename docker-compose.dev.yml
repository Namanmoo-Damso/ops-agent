services:
  voice-agent:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ["python", "voice/simple_agent.py", "start"]

  video-agent:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    # dockefile에 있는 CMD을 override / 덮어쓴다
    command: ["python", "voice/video-agent.py", "start"]

  transcript-storage:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ["python", "voice/transcript_storage_service.py"]