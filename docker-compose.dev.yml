services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    network_mode: host
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ['CMD', '/bin/ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  agent:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ['python', 'agent/agent.py', 'start']
    volumes:
      - .:/app
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f agent.py || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      ollama:
        condition: service_healthy

  transcript-storage:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ['python', 'agent/storage/transcript_listener.py']
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f transcript_listener.py || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - agent

  kma-mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8001/sse || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ollama-models:
