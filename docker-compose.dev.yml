services:
  vllm:
    image: vllm/vllm-openai:latest
    network_mode: host
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --model
      - Qwen/Qwen3-8B-AWQ
      - --quantization
      - awq_marlin
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.65"
      - --dtype
      - half
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  ai-server:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: ai-server
    network_mode: host
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_DEVICE=cuda
      - TTS_DEVICE=cuda
      - TTS_VOICE=F2
      - VAD_DEVICE=cuda
      - TURN_DETECTOR_DEVICE=cuda
      - MAX_CONCURRENT_REQUESTS=8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  vllm-warmup:
    build: .
    env_file: ./agent.env
    network_mode: host
    command: ['python', '-m', 'agent.warmup_service']
    restart: 'no'
    depends_on:
      vllm:
        condition: service_healthy

  agent:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ['python', '-m', 'agent.main', 'start']
    volumes:
      - .:/app
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f agent.main || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      vllm:
        condition: service_healthy
      ai-server:
        condition: service_healthy
      vllm-warmup:
        condition: service_completed_successfully

  transcript-storage:
    build: .
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    command: ['python', '-m', 'agent.storage.transcript_listener']
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f transcript_listener.py || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - agent

  kma-mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    env_file: ./agent.env
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8002/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  huggingface-cache:
